server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://10.18.39.100:3306/streetlight?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# MQTT 配置
mqtt:
  broker: tcp://localhost:1883
  client-id: streetlight-backend
  username:
  password:
  topic-prefix: streetlight
  # 连接超时（秒）
  connection-timeout: 30
  # 心跳间隔（秒）
  keep-alive-interval: 60

# 业务参数
streetlight:
  # 离线判定阈值（秒）
  offline-threshold-seconds: 30
  # 心跳检查间隔（秒）
  heartbeat-check-interval-seconds: 5
